

<script>
    const CONFIG = {
        account: 'tegskiftetlandskrona@gmail.com',
        password: 'Tegskiftet1',
        systemId: 'EPTWN1772141873',
        serial: 'CMU110A22640030',
        // Vi lägger till en proxy framför URL:en för att slippa CORS-problem
        baseUrl: 'https://corsproxy.io/?' + encodeURIComponent('https://openapi.sigencloud.com/openapi')
    };

    let authToken = "";

    async function login() {
        try {
            // Vi måste koda om hela URL:en för proxyn
            const loginUrl = 'https://corsproxy.io/?' + encodeURIComponent('https://openapi.sigencloud.com/openapi/auth/login/password');
            
            const response = await fetch(loginUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    account: CONFIG.account,
                    password: CONFIG.password
                })
            });
            const res = await response.json();
            if (res.data && res.data.token) {
                authToken = res.data.token;
                return true;
            }
        } catch (e) {
            console.error("Inloggningsfel:", e);
            document.getElementById('timestamp').innerText = "Inloggningsfel (CORS?)";
        }
        return false;
    }

    async function updateDisplay() {
        if (!authToken) {
            const success = await login();
            if (!success) return;
        }

        try {
            const rawUrl = `https://openapi.sigencloud.com/openapi/systems/${CONFIG.systemId}/devices/${CONFIG.serial}/realtimeInfo`;
            const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(rawUrl);

            const response = await fetch(proxyUrl, {
                headers: { 
                    'Authorization': `Bearer ${authToken}`,
                    'Content-Type': 'application/json'
                }
            });

            if (response.status === 401) {
                authToken = ""; 
                return;
            }

            const res = await response.json();
            
            if (res.data) {
                // Sigen kan ibland svara med olika fält, p_pv är vanligast för produktion
                const watts = res.data.p_pv || 0; 
                const kw = (watts / 1000).toFixed(1);
                
                document.getElementById('prod-value').innerText = kw;
                document.getElementById('timestamp').innerText = "Uppdaterat: " + new Date().toLocaleTimeString();
            }
        } catch (e) {
            document.getElementById('timestamp').innerText = "Kunde inte hämta data";
        }
    }

    updateDisplay();
    setInterval(updateDisplay, 20000);
    setInterval(() => { authToken = ""; }, 21600000);
</script>
