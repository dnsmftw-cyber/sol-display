<script>
    const CONFIG = {
        account: 'tegskiftetlandskrona@gmail.com',
        password: 'Tegskiftet1',
        systemId: 'EPTWN1772141873',
        serial: 'CMU110A22640030',
        apiBase: 'https://eu5.sigencloud.com/openapi', 
        proxy: 'https://api.allorigins.win/get?url='
    };

    let authToken = "";

    function updateStatus(msg) {
        document.getElementById('status-text').innerText = msg;
    }

    // En hjälpfunktion för att anropa genom AllOrigins-proxyn
    async function proxyFetch(targetUrl, method = 'GET', body = null) {
        const fullUrl = CONFIG.proxy + encodeURIComponent(targetUrl);
        const headers = { 'Accept': 'application/json' };
        if (authToken) headers['Authorization'] = 'Bearer ' + authToken;

        const options = { method: method, headers: headers };
        if (body) {
            options.method = 'POST';
            options.headers['Content-Type'] = 'application/json';
            options.body = JSON.stringify(body);
        }

        const response = await fetch(fullUrl);
        const wrapper = await response.json();
        // AllOrigins lägger det riktiga svaret som en sträng i "contents"
        return JSON.parse(wrapper.contents);
    }

    async function login() {
        updateStatus("Loggar in via AllOrigins...");
        try {
            const res = await proxyFetch(CONFIG.apiBase + '/auth/login/password', 'POST', {
                account: CONFIG.account,
                password: CONFIG.password
            });
            
            if (res && res.data && res.data.token) {
                authToken = res.data.token;
                return true;
            } else {
                updateStatus("Login misslyckades: Kolla lösenord");
                return false;
            }
        } catch (e) {
            updateStatus("Proxyn svarar inte. Vänta...");
            return false;
        }
    }

    async function updateData() {
        if (!authToken) {
            const loggedIn = await login();
            if (!loggedIn) return;
        }

        try {
            // 1. Realtid
            updateStatus("Hämtar effekt...");
            const realRes = await proxyFetch(CONFIG.apiBase + '/systems/' + CONFIG.systemId + '/devices/' + CONFIG.serial + '/realtimeInfo');
            if (realRes && realRes.data) {
                const kw = (realRes.data.pvPower || 0).toFixed(1);
                document.getElementById('current-prod').innerText = kw;
            }

            // 2. Statistik
            updateStatus("Hämtar statistik...");
            const statRes = await proxyFetch(CONFIG.apiBase + '/systems/' + CONFIG.systemId + '/energy/statistics?type=day');
            const list = statRes.data?.itemList || [];
            
            if (list.length > 0) {
                const getVal = (item) => item.powerGeneration || 0;
                const today = getVal(list[list.length - 1]);
                const week = list.slice(-7).reduce((acc, curr) => acc + getVal(curr), 0);
                const month = list.slice(-30).reduce((acc, curr) => acc + getVal(curr), 0);

                document.getElementById('stat-day').innerText = Math.round(today);
                document.getElementById('stat-week').innerText = Math.round(week);
                document.getElementById('stat-month').innerText = Math.round(month);
                updateStatus("Uppdaterat: " + new Date().toLocaleTimeString());
            }
        } catch (e) {
            updateStatus("Nätverksfel. Försöker igen om 30s.");
            authToken = ""; // Nollställ token vid fel för säkerhets skull
        }
    }

    updateData();
    setInterval(updateData, 30000);
</script>
