<script>
    const CONFIG = {
        account: 'tegskiftetlandskrona@gmail.com',
        password: 'Tegskiftet1',
        systemId: 'EPTWN1772141873',
        serial: 'CMU110A22640030'
    };

    let authToken = "";

    async function sigenRequest(path, method = 'GET', data = null) {
        const url = window.location.origin + '/api' + path; 
        
        const options = {
            method: method,
            headers: {
                'Accept': 'application/json, text/plain, */*',
                'Content-Type': 'application/json',
                // Vi lägger till språk och andra standard-headers som servrar gillar
                'Accept-Language': 'sv-SE,sv;q=0.9,en-US;q=0.8,en;q=0.7'
            }
        };
        
        if (authToken) options.headers['Authorization'] = 'Bearer ' + authToken;
        if (data) options.body = JSON.stringify(data);

        const response = await fetch(url, options);
        
        if (response.status === 404) throw new Error("Tunnel (404) - Kolla _redirects");
        if (response.status === 502) throw new Error("Sigenergy nekade anropet (502)");
        if (!response.ok) throw new Error("Serverfel: " + response.status);
        
        return await response.json();
    }

    async function update() {
        try {
            if (!authToken) {
                document.getElementById('status-text').innerText = "Öppnar säker tunnel...";
                const loginRes = await sigenRequest('/auth/login/password', 'POST', {
                    account: CONFIG.account,
                    password: CONFIG.password
                });
                
                if (loginRes && loginRes.data && loginRes.data.token) {
                    authToken = loginRes.data.token;
                } else {
                    throw new Error(loginRes.msg || "Inloggning nekad");
                }
            }

            // Hämta Realtid
            const realRes = await sigenRequest('/systems/' + CONFIG.systemId + '/devices/' + CONFIG.serial + '/realtimeInfo');
            if (realRes.data) {
                // Dubbelkoll om fältet heter pvPower eller p_pv
                const val = realRes.data.pvPower !== undefined ? realRes.data.pvPower : (realRes.data.p_pv / 1000 || 0);
                document.getElementById('current-prod').innerText = Number(val).toFixed(1);
            }

            // Hämta Statistik
            const statRes = await sigenRequest('/systems/' + CONFIG.systemId + '/energy/statistics?type=day');
            const list = statRes.data?.itemList || [];
            
            if (list.length > 0) {
                const getVal = (i) => i.powerGeneration || 0;
                document.getElementById('stat-day').innerText = Math.round(getVal(list[list.length - 1]));
                document.getElementById('stat-week').innerText = Math.round(list.slice(-7).reduce((a, b) => a + getVal(b), 0));
                document.getElementById('stat-month').innerText = Math.round(list.slice(-30).reduce((a, b) => a + getVal(b), 0));
            }

            document.getElementById('status-text').innerText = "☀️ System OK: " + new Date().toLocaleTimeString();

        } catch (e) {
            document.getElementById('status-text').innerText = "Status: " + e.message;
            // Om vi får 502 eller inloggningsfel, nollställ token
            authToken = ""; 
        }
    }

    update();
    setInterval(update, 30000);
</script>
