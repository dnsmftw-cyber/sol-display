<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tegskiftet Dashboard</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .main-display { text-align: center; margin-bottom: 30px; }
        .label { font-size: 1.5rem; color: #555; text-transform: uppercase; letter-spacing: 3px; }
        .value-large { font-size: 15rem; font-weight: 900; color: #00ff88; line-height: 0.8; }
        .unit-large { font-size: 3rem; color: #00ff88; }
        .stats-grid { display: flex; gap: 20px; border-top: 1px solid #111; padding-top: 20px; width: 90%; justify-content: space-around; }
        .stat-box { text-align: center; background: #080808; padding: 20px; border-radius: 10px; min-width: 180px; }
        .stat-label { font-size: 0.9rem; color: #666; text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { font-size: 3.5rem; font-weight: bold; color: #fff; }
        .stat-unit { font-size: 1rem; color: #444; }
        .footer { position: fixed; bottom: 10px; color: #222; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="main-display">
        <div class="label">Produktion Just Nu</div>
        <div id="current-prod" class="value-large">0.0</div>
        <div class="unit-large">kW</div>
    </div>

    <div class="stats-grid">
        <div class="stat-box">
            <div class="stat-label">Idag</div>
            <div><span id="stat-day" class="stat-value">-</span> <span class="stat-unit">kWh</span></div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Vecka</div>
            <div><span id="stat-week" class="stat-value">-</span> <span class="stat-unit">kWh</span></div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Månad</div>
            <div><span id="stat-month" class="stat-value">-</span> <span class="stat-unit">kWh</span></div>
        </div>
    </div>

    <div id="timestamp" class="footer">Uppdaterar...</div>

    <script>
        const CONFIG = {
            account: 'tegskiftetlandskrona@gmail.com',
            password: 'Tegskiftet1',
            systemId: 'EPTWN1772141873',
            serial: 'CMU110A22640030',
            apiBase: 'https://eu5.sigencloud.com/openapi', 
            proxy: 'https://corsproxy.io/?'
        };

        let authToken = "";

        async function login() {
            try {
                const url = CONFIG.proxy + encodeURIComponent(CONFIG.apiBase + '/auth/login/password');
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ account: CONFIG.account, password: CONFIG.password })
                });
                const res = await response.json();
                if (res.data && res.data.token) {
                    authToken = res.data.token;
                    return true;
                }
            } catch (e) { console.error("Login fail", e); }
            return false;
        }

        async function updateData() {
            if (!authToken && !(await login())) return;

            try {
                // 1. Hämta realtidsinfo för stora siffran
                const realUrl = CONFIG.proxy + encodeURIComponent(CONFIG.apiBase + '/systems/' + CONFIG.systemId + '/devices/' + CONFIG.serial + '/realtimeInfo');
                const realRes = await fetch(realUrl, { headers: { 'Authorization': 'Bearer ' + authToken } }).then(r => r.json());
                
                if (realRes.data) {
                    // Enligt din dokumentation heter det pvPower och är redan i kW
                    const kw = (realRes.data.pvPower || 0).toFixed(1);
                    document.getElementById('current-prod').innerText = kw;
                }

                // 2. Hämta statistik (kWh)
                const statUrl = CONFIG.proxy + encodeURIComponent(CONFIG.apiBase + '/systems/' + CONFIG.systemId + '/energy/statistics?type=day');
                const statRes = await fetch(statUrl, { headers: { 'Authorization': 'Bearer ' + authToken } }).then(r => r.json());
                
                // Vi försöker hitta listan i svaret (kan ligga i res.data eller res.data.list)
                const list = statRes.data?.list || statRes.data || [];
                
                if (Array.isArray(list) && list.length > 0) {
                    // Vi letar efter fältet för energi (troligen yieldEnergy eller ePv)
                    const getVal = (obj) => obj.yieldEnergy || obj.ePv || obj.energy || obj.pvEnergy || 0;

                    const today = getVal(list[list.length - 1]);
                    const week = list.slice(-7).reduce((a, b) => a + getVal(b), 0);
                    const month = list.slice(-30).reduce((a, b) => a + getVal(b), 0);

                    document.getElementById('stat-day').innerText = Math.round(today);
                    document.getElementById('stat-week').innerText = Math.round(week);
                    document.getElementById('stat-month').innerText = Math.round(month);
                }

                document.getElementById('timestamp').innerText = "Uppdaterat: " + new Date().toLocaleTimeString();
            } catch (e) {
                document.getElementById('timestamp').innerText = "Fel vid hämtning";
            }
        }

        updateData();
        setInterval(updateData, 30000);
    </script>
</body>
</html>
