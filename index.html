<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tegskiftet Dashboard</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .main-display { text-align: center; margin-bottom: 30px; }
        .label { font-size: 1.5rem; color: #444; text-transform: uppercase; letter-spacing: 3px; }
        .value-large { font-size: 15rem; font-weight: 900; color: #00ff88; line-height: 0.8; }
        .unit-large { font-size: 3rem; color: #00ff88; }
        .stats-grid { display: flex; gap: 20px; border-top: 1px solid #111; padding-top: 25px; width: 95%; justify-content: space-around; }
        .stat-box { text-align: center; background: #080808; padding: 20px; border-radius: 15px; min-width: 180px; border: 1px solid #111; }
        .stat-label { font-size: 0.9rem; color: #666; text-transform: uppercase; margin-bottom: 8px; }
        .stat-value { font-size: 3.5rem; font-weight: bold; color: #fff; }
        .stat-unit { font-size: 1rem; color: #333; margin-left: 5px; }
        .footer { position: fixed; bottom: 20px; color: #555; font-size: 1rem; background: #111; padding: 5px 20px; border-radius: 20px; }
    </style>
</head>
<body>

    <div id="error-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; background:red; color:white; padding:10px; text-align:center; z-index:9999;">
        Ett fel uppstod i koden. Kontrollera index.html.
    </div>

    <div class="main-display">
        <div class="label">Produktion Just Nu</div>
        <div id="current-prod" class="value-large">0.0</div>
        <div class="unit-large">kW</div>
    </div>

    <div class="stats-grid">
        <div class="stat-box">
            <div class="stat-label">Idag</div>
            <div><span id="stat-day" class="stat-value">0</span><span class="stat-unit">kWh</span></div>
        </div>
        <div class="stat-box">
            <div class="stat-label">7 dagar</div>
            <div><span id="stat-week" class="stat-value">0</span><span class="stat-unit">kWh</span></div>
        </div>
        <div class="stat-box">
            <div class="stat-label">30 dagar</div>
            <div><span id="stat-month" class="stat-value">0</span><span class="stat-unit">kWh</span></div>
        </div>
    </div>

    <div id="status-text" class="footer">Startar systemet...</div>

    <script>
        // Felsökning: Om scriptet kraschar, visa röd bar
        window.onerror = function(msg) {
            document.getElementById('error-overlay').style.display = 'block';
            document.getElementById('error-overlay').innerText = "Scriptfel: " + msg;
        };

        const CONFIG = {
            account: 'tegskiftetlandskrona@gmail.com',
            password: 'Tegskiftet1',
            systemId: 'EPTWN1772141873',
            serial: 'CMU110A22640030'
        };

        let authToken = "";

        async function sigenRequest(path, method = 'GET', data = null) {
            const url = window.location.origin + '/api' + path; 
            
            const headers = {
                'Accept': 'application/json',
                'Content-Type': 'application/json'
            };
            
            if (authToken) {
                headers['Authorization'] = 'Bearer ' + authToken;
            }

            const options = {
                method: method,
                headers: headers
            };
            
            if (data) {
                options.body = JSON.stringify(data);
            }

            const response = await fetch(url, options);
            
            if (response.status === 404) throw new Error("Tunnel ej aktiv (404)");
            if (response.status === 502) throw new Error("Sigenergy svarar ej (502)");
            if (!response.ok) throw new Error("Fel: " + response.status);
            
            return await response.json();
        }

        async function update() {
            try {
                // 1. Inloggning
                if (!authToken) {
                    document.getElementById('status-text').innerText = "Loggar in...";
                    const loginRes = await sigenRequest('/auth/login/password', 'POST', {
                        account: CONFIG.account,
                        password: CONFIG.password
                    });
                    
                    if (loginRes && loginRes.data && loginRes.data.token) {
                        authToken = loginRes.data.token;
                    } else {
                        throw new Error("Inloggning misslyckades");
                    }
                }

                // 2. Realtid
                const realRes = await sigenRequest('/systems/' + CONFIG.systemId + '/devices/' + CONFIG.serial + '/realtimeInfo');
                if (realRes && realRes.data) {
                    const val = realRes.data.pvPower !== undefined ? realRes.data.pvPower : 0;
                    document.getElementById('current-prod').innerText = Number(val).toFixed(1);
                }

                const statRes = await sigenRequest('/systems/' + CONFIG.systemId + '/energy/statistics?type=day');
